name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secrets
        env:
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$APPS_SCRIPT_URL" ] || [ -z "$GEMINI_API_KEY" ]; then
            echo "::error::Faltan los secrets APPS_SCRIPT_URL y/o GEMINI_API_KEY en Settings → Secrets and variables → Actions"
            exit 1
          fi
          if [ "$GEMINI_API_KEY" = "$APPS_SCRIPT_URL" ]; then
            echo "::error::GEMINI_API_KEY y APPS_SCRIPT_URL tienen el mismo valor. Corregí los secrets."
            exit 1
          fi
          case "$GEMINI_API_KEY" in
            http://*|https://*)
              echo "::error::GEMINI_API_KEY no puede ser una URL. Pegá solo la API key de Google AI Studio."
              exit 1
              ;;
          esac

      - name: Generate config.js
        env:
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          node <<'NODE'
          const fs = require("fs");
          const appsScriptUrl = (process.env.APPS_SCRIPT_URL || "").trim();
          const geminiApiKey = (process.env.GEMINI_API_KEY || "").trim();
          const content =
            "const APPS_SCRIPT_URL = " + JSON.stringify(appsScriptUrl) + ";\n" +
            "const GEMINI_API_KEY  = " + JSON.stringify(geminiApiKey) + ";\n";
          fs.writeFileSync("config.js", content);
          NODE

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages-deploy
      cancel-in-progress: false
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
